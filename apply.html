<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply — Kairos Financial</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body {
      background: #faf8f4;
      margin: 0;
      padding: 0;
    }

    .apply-header {
      background: #111111;
      text-align: center;
      padding: 2rem 1.5rem;
    }

    .apply-header a {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      color: #c9a84c;
      text-decoration: none;
      letter-spacing: 0.08em;
    }

    .apply-container {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    .apply-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: #111111;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .apply-sub {
      font-size: 0.9rem;
      color: #666;
      text-align: center;
      margin-bottom: 2rem;
    }

    .apply-container iframe {
      width: 100% !important;
      height: 3200px !important;
      max-height: none !important;
      overflow: hidden !important;
      border: none !important;
      border-radius: 4px;
      display: block;
    }

    @media (max-width: 768px) {
      .apply-container iframe {
        height: 3400px !important;
      }
    }
  </style>
</head>
<body>

  <div class="apply-header">
    <a href="careers.html">KAIROS FINANCIAL</a>
  </div>

  <div class="apply-container">
    <h1 class="apply-title">Application</h1>
    <p class="apply-sub">Fill out the form below. It takes about 5 minutes.</p>

    <iframe
      src="https://api.leadconnectorhq.com/widget/form/bGm1drb3HYEP8hOJau7d"
      style="width:100%;height:100%;border:none;border-radius:4px"
      scrolling="no"
      id="inline-bGm1drb3HYEP8hOJau7d"
      data-layout="{'id':'INLINE'}"
      data-trigger-type="alwaysShow"
      data-trigger-value=""
      data-activation-type="alwaysActivated"
      data-activation-value=""
      data-deactivation-type="neverDeactivate"
      data-deactivation-value=""
      data-form-name="Application"
      data-height="2299"
      data-layout-iframe-id="inline-bGm1drb3HYEP8hOJau7d"
      data-form-id="bGm1drb3HYEP8hOJau7d"
      title="Application"
    ></iframe>
    <script src="https://link.msgsndr.com/js/form_embed.js"></script>
  </div>

  <script>
    // GHL's form_embed.js overwrites iframe styles after load.
    // This observer catches those changes and re-applies our overrides.
    const iframe = document.getElementById('inline-bGm1drb3HYEP8hOJau7d');
    if (iframe) {
      const enforce = () => {
        iframe.style.setProperty('overflow', 'hidden', 'important');
        iframe.style.setProperty('height', (window.innerWidth <= 768 ? '3400px' : '3200px'), 'important');
        iframe.style.setProperty('max-height', 'none', 'important');
        iframe.setAttribute('scrolling', 'no');
      };
      enforce();
      new MutationObserver(enforce).observe(iframe, { attributes: true, attributeFilter: ['style'] });
    }
  </script>
</body>
</html>
