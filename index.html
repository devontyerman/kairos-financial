<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/KF Transparent.png" />
  <title>Kairos Financial — Agent Portal</title>
  <meta name="description" content="Kairos Financial Agent Portal — Resources, tools, and training for our agents." />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    /* Home-specific styles */
    .home-sections {
      background: transparent;
      position: relative;
      z-index: 1;
    }

    /* Password gate — hero-style layout */
    .gate-video-wrapper {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .gate-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(0,0,0,0.45) 0%,
        rgba(0,0,0,0.4) 35%,
        rgba(0,0,0,0.6) 70%,
        rgba(0,0,0,0.85) 100%
      );
      z-index: 1;
    }
    .gate-content {
      position: relative;
      z-index: 2;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .gate-hero-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: clamp(2.8rem, 7vw, 5rem);
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.75rem;
    }
    .gate-definition {
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.85rem, 1.8vw, 1.05rem);
      color: rgba(255,255,255,0.85);
      max-width: 520px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }
    .gate-definition em {
      color: var(--gold);
      font-style: italic;
    }
    .password-gate-subtitle {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
      margin-bottom: 1.25rem;
    }

    /* Hero buttons */
    .hero-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

  <!-- Site content (the agent-side gate now lives on the Sales Hub
       sign-up form: the access code is required to register, not to
       browse the marketing pages). -->
  <div id="siteContent">

  <!-- ============================================================
       NAVIGATION
  ============================================================= -->
  <nav class="nav" id="mainNav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo" style="display:none;">
        <div class="nav-logo-mark"></div>
        <span class="nav-logo-text"></span>
      </a>

      <ul class="nav-links">
        <li><a href="https://ai.kairos-financial.com/" class="nav-link" target="_blank" rel="noopener noreferrer">AI Training</a></li>
      </ul>

      <button class="nav-hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Mobile nav -->
  <div class="nav-mobile" id="mobileNav">
    <a href="https://ai.kairos-financial.com/" target="_blank" rel="noopener noreferrer">AI Training</a>
  </div>

  <!-- ============================================================
       HERO — NYC SKYLINE VIDEO
  ============================================================= -->
  <section class="hero">
    <div class="hero-video-wrapper">
      <div class="hero-video-fallback"></div>
      <img src="assets/hero-bg.jpg" alt="" class="hero-video" />
    </div>

    <!-- Gradient overlay for text legibility + bottom fade -->
    <div class="hero-overlay"></div>

    <!-- JS-controlled scroll fade layer -->
    <div class="hero-scroll-fade"></div>

    <!-- Hero content -->
    <div class="hero-content">
      <h1 class="hero-title">
        Welcome to<br />
        <span class="hero-title-gold">Kairos</span>
      </h1>

      <p class="hero-tagline">
        <strong style="color:#ffffff;">Kairos</strong> <em>(noun)</em><br />
        The perfect, critical, or opportune moment to take action.<br />
        A time when conditions align for maximum impact or success.
      </p>

      <div class="hero-buttons">
        <a href="saleshub.html" class="btn btn-primary btn-lg">Sales Hub</a>
      </div>
    </div>

  </section>

  <!-- ============================================================
       MAIN CONTENT
  ============================================================= -->

  </div><!-- /siteContent -->

  <script src="js/main.js"></script>
</body>
</html>
