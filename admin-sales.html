    body { background: linear-gradient(180deg, #0a0e1a 0%, #0d1117 100%); min-height: 100vh; }

    /* Gate */
    .admin-gate { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }

    .admin-gate-card p { font-size: 0.8rem; color: rgba(255,255,255,0.35); margin-bottom: 1.25rem; }
    .admin-gate-card input { width: 100%; padding: 0.65rem 0.9rem; font-size: 0.88rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; margin-bottom: 1rem; color: #fff; box-sizing: border-box; }
    .admin-gate-card input:focus { outline: none; border-color: #3b82f6; }
    .admin-gate-card input::placeholder { color: rgba(255,255,255,0.25); }
    .admin-gate-card button { width: 100%; padding: 0.7rem; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.88rem; font-weight: 700; color: #fff; background: linear-gradient(135deg, #2563eb, #3b82f6); border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; }

    .admin-gate-card .err { color: #f87171; font-size: 0.78rem; margin-top: 0.5rem; display: none; }

    .admin-page { display: none; padding: calc(var(--nav-height) + 2rem) 1.5rem 4rem; max-width: 1300px; margin: 0 auto; }
    .admin-page.visible { display: block; }

    .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .admin-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.4rem; font-weight: 900; color: #fff; }
    .admin-subtitle { font-size: 0.8rem; color: rgba(255,255,255,0.35); }

    .admin-stats { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }

    .admin-add-btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1rem; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.78rem; font-weight: 700; color: #fff; background: linear-gradient(135deg, #2563eb, #3b82f6); border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; }
    .admin-add-btn:hover { box-shadow: 0 4px 12px rgba(37,99,235,0.3); }

    .admin-table { width: 100%; border-collapse: collapse; min-width: 950px; }
    .admin-table thead th { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.3); padding: 0.65rem 0.75rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.03); white-space: nowrap; cursor: pointer; user-select: none; transition: color 0.2s; }

    .abtn-edit { background: rgba(56,120,255,0.12); color: #60a5fa; border: 1px solid rgba(56,120,255,0.2); }

    .abtn-status { background: rgba(34,197,94,0.1); color: #4ade80; border: 1px solid rgba(34,197,94,0.15); }
    .abtn-status:hover { background: rgba(34,197,94,0.2); }

    /* Edit modal */

    .ae-modal { background: #1a1f2e; border: 1px solid rgba(56,120,255,0.15); border-radius: 16px; padding: 2rem; max-width: 520px; width: 92%; animation: aePop 0.3s ease; }

    .ae-modal h3 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.1rem; font-weight: 800; color: #fff; margin-bottom: 1.25rem; }
    .ae-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .ae-field label { display: block; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.68rem; font-weight: 700; color: rgba(255,255,255,0.35); margin-bottom: 0.2rem; text-transform: uppercase; letter-spacing: 0.06em; }

    .admin-tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 0.75rem; }
    .admin-tab { padding: 0.6rem 1.4rem; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.85rem; font-weight: 700; color: rgba(255,255,255,0.4); background: none; border: 1px solid transparent; border-radius: 100px; cursor: pointer; transition: all 0.2s; }

    .perf-rep-select option { background: #1a1f2e; }

    .perf-kpis { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.75rem; margin-bottom: 2rem; }
    .perf-kpi { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 1.25rem; }
    .perf-kpi-label { font-size: 0.68rem; font-weight: 700; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.4rem; }
    .perf-kpi-value { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.5rem; font-weight: 900; color: #fff; }
    .perf-kpi-change { font-size: 0.72rem; font-weight: 700; margin-top: 0.25rem; }
    .perf-kpi-change.up { color: #4ade80; }
    .perf-kpi-change.down { color: #f87171; }
    .perf-kpi-change.neutral { color: rgba(255,255,255,0.3); }

    /* Bar Charts */
    .perf-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
    .perf-chart-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 1.5rem; }
    .perf-chart-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.85rem; font-weight: 800; color: #fff; margin-bottom: 1rem; }
    .perf-bars { display: flex; flex-direction: column; gap: 0.5rem; }
    .perf-bar-row { display: flex; align-items: center; gap: 0.5rem; }
    .perf-bar-label { font-size: 0.72rem; color: rgba(255,255,255,0.5); width: 65px; flex-shrink: 0; text-align: right; }
    .perf-bar-track { flex: 1; height: 24px; background: rgba(255,255,255,0.04); border-radius: 6px; overflow: hidden; position: relative; }
    .perf-bar-fill { height: 100%; border-radius: 6px; transition: width 0.6s ease; display: flex; align-items: center; padding-left: 0.5rem; min-width: 0; }
    .perf-bar-fill.blue { background: linear-gradient(90deg, #2563eb, #3b82f6); }
    .perf-bar-fill.green { background: linear-gradient(90deg, #15803d, #22c55e); }
    .perf-bar-fill.gold { background: linear-gradient(90deg, #a16207, #eab308); }
    .perf-bar-val { font-size: 0.68rem; font-weight: 700; color: #fff; white-space: nowrap; }

    /* Status breakdown */
    .perf-status-section { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
    .perf-status-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.85rem; font-weight: 800; color: #fff; margin-bottom: 1rem; }
    .perf-status-bars { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .perf-status-item { flex: 1; min-width: 120px; }
    .perf-status-item-label { font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-bottom: 0.3rem; display: flex; justify-content: space-between; }
    .perf-status-item-bar { height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
    .perf-status-item-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .perf-status-item-fill.uw { background: #eab308; }
    .perf-status-item-fill.app { background: #22c55e; }
    .perf-status-item-fill.paid { background: #3b82f6; }

    @media (max-width: 768px) {
      .admin-page { padding: calc(var(--nav-height) + 1rem) 1rem 3rem; }
      .ae-grid { grid-template-columns: 1fr; }
      .admin-stats { gap: 0.5rem; }

      .perf-charts { grid-template-columns: 1fr; }
      .perf-kpis { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

    if (sessionStorage.getItem('admin_auth') === 'true') { gate.style.display = 'none'; page.classList.add('visible'); loadAll(); }

    document.getElementById('adminLogin').addEventListener('click', () => {
      if (document.getElementById('adminPw').value === ADMIN_PASSWORD) {
        sessionStorage.setItem('admin_auth', 'true');
        gate.style.display = 'none'; page.classList.add('visible'); loadAll();
      } else { document.getElementById('adminErr').style.display = 'block'; }
    });
    document.getElementById('adminPw').addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('adminLogin').click(); });

    // ─── FILTERS ───
    document.querySelectorAll('#adminTimeFilters .af').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('#adminTimeFilters .af').forEach(x => x.classList.remove('active'));
        b.classList.add('active'); currentRange = b.dataset.range; applyFilters();
      });
    });
    document.querySelectorAll('#adminStatusFilters .af').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('#adminStatusFilters .af').forEach(x => x.classList.remove('active'));
        b.classList.add('active'); currentStatus = b.dataset.status; applyFilters();
      });
    });
    document.getElementById('adminRepFilter').addEventListener('change', (e) => { currentRep = e.target.value; applyFilters(); });

    // ─── LOAD ───
    async function loadAll() {
      const container = document.getElementById('adminTableContent');
      container.innerHTML = '<div class="admin-loading">Loading...</div>';

      try {
        const res = await fetch(SUPABASE_URL + '/rest/v1/policies?select=*&order=created_at.desc', { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } });
        allData = await res.json();
      } catch (e) { allData = []; }

      // Populate rep dropdown
      const reps = [...new Set(allData.map(r => r.sales_rep).filter(Boolean))].sort();
      const repSel = document.getElementById('adminRepFilter');
      repSel.innerHTML = '<option value="all">All Reps (' + allData.length + ')</option>';
      reps.forEach(r => {
        const count = allData.filter(d => d.sales_rep === r).length;
        const o = document.createElement('option'); o.value = r; o.textContent = r + ' (' + count + ')'; repSel.appendChild(o);
      });
      if (currentRep !== 'all') repSel.value = currentRep;

      applyFilters();
    }

    function applyFilters() {
      const now = new Date();
      filteredData = allData.filter(row => {
        // Rep filter
        if (currentRep !== 'all' && row.sales_rep !== currentRep) return false;
        // Status filter
        if (currentStatus !== 'all' && row.status !== currentStatus) return false;
        // Time filter
        if (currentRange !== 'all') {
          const d = new Date(row.created_at);
          if (currentRange === 'week') {
            const start = new Date(now); start.setDate(start.getDate() - start.getDay()); start.setHours(0,0,0,0);
            if (d < start) return false;
          } else if (currentRange === 'month') {
            if (d < new Date(now.getFullYear(), now.getMonth(), 1)) return false;
          } else if (currentRange === 'ytd') {
            if (d < new Date(now.getFullYear(), 0, 1)) return false;
          }
        }
        return true;
      });

      // Sort
      filteredData.sort((a, b) => {
        let va = a[sortCol], vb = b[sortCol];
        if (sortCol === 'annual_premium') { va = parseFloat(va||0); vb = parseFloat(vb||0); }
        else { va = (va||'').toString().toLowerCase(); vb = (vb||'').toString().toLowerCase(); }
        if (va < vb) return sortDir === 'asc' ? -1 : 1;
        if (va > vb) return sortDir === 'asc' ? 1 : -1;
        return 0;
      });

      renderStats();
      renderTable();
    }

    function renderStats() {
      const totalAP = filteredData.reduce((s, r) => s + parseFloat(r.annual_premium || 0), 0);
      const uwCount = filteredData.filter(r => r.status === 'Underwriting').length;
      const appCount = filteredData.filter(r => r.status === 'Approved').length;
      const paidCount = filteredData.filter(r => r.status === 'Issue Paid').length;

      document.getElementById('adminStats').innerHTML =
        '<div class="admin-stat"><div class="admin-stat-value">' + filteredData.length + '</div><div class="admin-stat-label">Policies</div></div>' +
        '<div class="admin-stat"><div class="admin-stat-value" style="color:#60a5fa;">$' + totalAP.toLocaleString('en-US',{maximumFractionDigits:0}) + '</div><div class="admin-stat-label">Total AP</div></div>' +
        '<div class="admin-stat"><div class="admin-stat-value" style="color:#fbbf24;">' + uwCount + '</div><div class="admin-stat-label">Underwriting</div></div>' +
        '<div class="admin-stat"><div class="admin-stat-value" style="color:#4ade80;">' + appCount + '</div><div class="admin-stat-label">Approved</div></div>' +
        '<div class="admin-stat"><div class="admin-stat-value" style="color:#60a5fa;">' + paidCount + '</div><div class="admin-stat-label">Issue Paid</div></div>';
    }

    function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function renderTable() {
      const container = document.getElementById('adminTableContent');
      if (!filteredData.length) { container.innerHTML = '<div class="admin-empty">No policies match the current filters.</div>'; return; }

      const cols = [
        {key:'created_at',label:'Date'},{key:'sales_rep',label:'Sales Rep'},{key:'client_name',label:'Client'},
        {key:'annual_premium',label:'AP'},{key:'carrier',label:'Carrier'},{key:'product_type',label:'Product'},
        {key:'policy_number',label:'Policy #'},{key:'status',label:'Status'}
      ];

      let html = '<table class="admin-table"><thead><tr>';
      cols.forEach(c => {
        const sorted = sortCol === c.key;
        const arrow = sorted ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';
        html += '<th class="' + (sorted?'sorted':'') + '" data-sort="' + c.key + '">' + c.label + arrow + '</th>';
      });
      html += '<th>Actions</th></tr></thead><tbody>';

      filteredData.forEach(row => {
        const d = new Date(row.created_at);
        const dateStr = (d.getMonth()+1) + '/' + d.getDate() + '/' + d.getFullYear();
        const ap = parseFloat(row.annual_premium || 0);
        const status = row.status || 'Underwriting';
        const statusClass = status.toLowerCase().replace(/\s+/g, '-');

        html += '<tr>';
        html += '<td class="td-date">' + dateStr + '</td>';
        html += '<td class="td-rep">' + esc(row.sales_rep) + '</td>';
        html += '<td>' + esc(row.client_name) + '</td>';
        html += '<td class="td-ap">$' + ap.toLocaleString('en-US',{minimumFractionDigits:0}) + '</td>';
        html += '<td>' + esc(row.carrier) + '</td>';
        html += '<td>' + esc(row.product_type) + '</td>';
        html += '<td>' + esc(row.policy_number) + '</td>';
        html += '<td><span class="ss-status ' + statusClass + '">' + status + '</span></td>';
        html += '<td class="admin-actions">';
        if (status === 'Underwriting') html += '<button class="abtn abtn-status" data-id="' + row.id + '" data-action="approve">Approve</button>';
        if (status === 'Approved') html += '<button class="abtn abtn-status" data-id="' + row.id + '" data-action="paid">Issue Paid</button>';
        html += '<button class="abtn abtn-edit" data-id="' + row.id + '">Edit</button>';
        html += '<button class="abtn abtn-del" data-id="' + row.id + '">Del</button>';
        html += '</td></tr>';
      });
      html += '</tbody></table>';
      container.innerHTML = html;

      // Sort handlers
      container.querySelectorAll('[data-sort]').forEach(th => {
        th.addEventListener('click', () => {
          const col = th.dataset.sort;
          if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
          else { sortCol = col; sortDir = col === 'annual_premium' || col === 'created_at' ? 'desc' : 'asc'; }
          applyFilters();
        });
      });

      // Quick status buttons
      container.querySelectorAll('[data-action="approve"]').forEach(b => {
        b.addEventListener('click', async () => { await patchStatus(b.dataset.id, 'Approved'); loadAll(); });
      });
      container.querySelectorAll('[data-action="paid"]').forEach(b => {
        b.addEventListener('click', async () => { await patchStatus(b.dataset.id, 'Issue Paid'); loadAll(); });
      });

      // Edit
      container.querySelectorAll('.abtn-edit').forEach(b => {
        b.addEventListener('click', () => openEdit(b.dataset.id));
      });

      // Delete
      container.querySelectorAll('.abtn-del').forEach(b => {
        b.addEventListener('click', async () => {
          if (!confirm('Delete this policy permanently?')) return;
          await fetch(SUPABASE_URL + '/rest/v1/policies?id=eq.' + b.dataset.id, { method: 'DELETE', headers: hdrs });
          loadAll();
        });
      });
    }

    async function patchStatus(id, status) {
      await fetch(SUPABASE_URL + '/rest/v1/policies?id=eq.' + id, {
        method: 'PATCH', headers: hdrs, body: JSON.stringify({ status })
      });
    }

    // ─── EDIT MODAL ───
    const aeOverlay = document.getElementById('aeOverlay');
    document.getElementById('aeCancel').addEventListener('click', () => aeOverlay.classList.remove('open'));
    aeOverlay.addEventListener('click', (e) => { if (e.target === aeOverlay) aeOverlay.classList.remove('open'); });

    function openEdit(id) {
      const row = allData.find(r => r.id === id);
      if (!row) return;
      editId = id;
      document.getElementById('aeRep').value = row.sales_rep || '';
      document.getElementById('aeClient').value = row.client_name || '';
      document.getElementById('aeAP').value = row.annual_premium || '';
      document.getElementById('aePolicy').value = row.policy_number || '';
      document.getElementById('aeCarrier').value = row.carrier || '';
      document.getElementById('aeProduct').value = row.product_type || '';
      document.getElementById('aeStatus').value = row.status || 'Underwriting';
      aeOverlay.classList.add('open');
    }

    document.getElementById('aeForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      await fetch(SUPABASE_URL + '/rest/v1/policies?id=eq.' + editId, {
        method: 'PATCH', headers: hdrs,
        body: JSON.stringify({
          sales_rep: document.getElementById('aeRep').value,
          client_name: document.getElementById('aeClient').value,
          annual_premium: parseFloat(document.getElementById('aeAP').value),
          policy_number: document.getElementById('aePolicy').value,
          carrier: document.getElementById('aeCarrier').value,
          product_type: document.getElementById('aeProduct').value,
          status: document.getElementById('aeStatus').value
        })
      });
      aeOverlay.classList.remove('open');
      loadAll();
    });

    // ─── ADD MODAL ───
    const addOverlay = document.getElementById('addOverlay');
    document.getElementById('addRecordBtn').addEventListener('click', () => addOverlay.classList.add('open'));
    document.getElementById('addCancel').addEventListener('click', () => addOverlay.classList.remove('open'));
    addOverlay.addEventListener('click', (e) => { if (e.target === addOverlay) addOverlay.classList.remove('open'); });

    document.getElementById('addForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      await fetch(SUPABASE_URL + '/rest/v1/policies', {
        method: 'POST', headers: hdrs,
        body: JSON.stringify({
          sales_rep: document.getElementById('addRep').value,
          client_name: document.getElementById('addClient').value,
          annual_premium: parseFloat(document.getElementById('addAP').value),
          policy_number: document.getElementById('addPolicy').value,
          carrier: document.getElementById('addCarrier').value,
          product_type: document.getElementById('addProduct').value,
          status: document.getElementById('addStatus').value
        })
      });
      addOverlay.classList.remove('open');
      e.target.reset();
      loadAll();
    });

    // Escape closes modals
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { aeOverlay.classList.remove('open'); addOverlay.classList.remove('open'); }
    });

    // ─── ADMIN TABS ───
    document.querySelectorAll('.admin-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('atab-' + tab.dataset.atab).classList.add('active');
        if (tab.dataset.atab === 'performance') renderPerformance();
      });
    });

    // ─── PERFORMANCE DASHBOARD ───
    let perfRep = 'all';
    document.getElementById('perfRepSelect').addEventListener('change', (e) => { perfRep = e.target.value; renderPerformance(); });

    function renderPerformance() {
      // Populate rep dropdown
      const reps = [...new Set(allData.map(r => r.sales_rep).filter(Boolean))].sort();
      const sel = document.getElementById('perfRepSelect');
      const prev = sel.value;
      sel.innerHTML = '<option value="all">All Reps (Team)</option>';
      reps.forEach(r => { const o = document.createElement('option'); o.value = r; o.textContent = r; sel.appendChild(o); });
      sel.value = prev || 'all';
      perfRep = sel.value;

      // Filter data by rep
      const data = perfRep === 'all' ? allData : allData.filter(r => r.sales_rep === perfRep);

      const now = new Date();
      const weekStart = new Date(now); weekStart.setDate(weekStart.getDate() - weekStart.getDay()); weekStart.setHours(0,0,0,0);
      const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
      const yearStart = new Date(now.getFullYear(), 0, 1);
      const lastMonthStart = new Date(now.getFullYear(), now.getMonth() - 1, 1);
      const lastMonthEnd = new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59);

      const wtd = data.filter(r => new Date(r.created_at) >= weekStart);
      const mtd = data.filter(r => new Date(r.created_at) >= monthStart);
      const ytd = data.filter(r => new Date(r.created_at) >= yearStart);
      const lastMonth = data.filter(r => { const d = new Date(r.created_at); return d >= lastMonthStart && d <= lastMonthEnd; });

      const sumAP = arr => arr.reduce((s, r) => s + parseFloat(r.annual_premium || 0), 0);
      const wtdAP = sumAP(wtd), mtdAP = sumAP(mtd), ytdAP = sumAP(ytd), lmAP = sumAP(lastMonth);

      // Month over month change
      const momChange = lmAP > 0 ? ((mtdAP - lmAP) / lmAP * 100) : (mtdAP > 0 ? 100 : 0);
      const momClass = momChange > 0 ? 'up' : momChange < 0 ? 'down' : 'neutral';
      const momSign = momChange > 0 ? '+' : '';

      // Yearly pace: (ytdAP / days elapsed) * 365
      const dayOfYear = Math.floor((now - yearStart) / (1000*60*60*24)) + 1;
      const yearlyPace = dayOfYear > 0 ? (ytdAP / dayOfYear) * 365 : 0;
      const monthlyPace = dayOfYear > 0 ? (ytdAP / dayOfYear) * 30.44 : 0;

      // Avg per policy
      const avgPerPolicy = ytd.length > 0 ? ytdAP / ytd.length : 0;

      // KPIs
      document.getElementById('perfKpis').innerHTML =
        kpi('Week to Date', wtd.length + ' policies', '$' + fmtAP(wtdAP)) +
        kpi('Month to Date', mtd.length + ' policies', '$' + fmtAP(mtdAP)) +
        kpi('Year to Date', ytd.length + ' policies', '$' + fmtAP(ytdAP)) +
        kpi('Last Month', lastMonth.length + ' policies', '$' + fmtAP(lmAP)) +
        '<div class="perf-kpi"><div class="perf-kpi-label">Month vs Last Month</div><div class="perf-kpi-value" style="font-size:1.3rem;">' + momSign + momChange.toFixed(1) + '%</div><div class="perf-kpi-change ' + momClass + '">' + (momChange > 0 ? '↑ Trending up' : momChange < 0 ? '↓ Trending down' : '— Flat') + '</div></div>' +
        kpi('Yearly Pace', '$' + fmtAP(yearlyPace), '$' + fmtAP(monthlyPace) + '/mo') +
        kpi('Avg Per Policy', '$' + fmtAP(avgPerPolicy), ytd.length + ' policies YTD');

      // Bar charts - monthly breakdown and rep comparison
      const months = {};
      ytd.forEach(r => {
        const d = new Date(r.created_at);
        const key = d.toLocaleString('default', { month: 'short' });
        if (!months[key]) months[key] = { count: 0, ap: 0 };
        months[key].count++;
        months[key].ap += parseFloat(r.annual_premium || 0);
      });

      const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const currentMonthIdx = now.getMonth();
      const activeMonths = monthNames.slice(0, currentMonthIdx + 1);
      const maxMonthAP = Math.max(...activeMonths.map(m => (months[m]?.ap || 0)), 1);

      let monthBars = '';
      activeMonths.forEach(m => {
        const val = months[m]?.ap || 0;
        const pct = (val / maxMonthAP * 100).toFixed(1);
        monthBars += '<div class="perf-bar-row"><div class="perf-bar-label">' + m + '</div><div class="perf-bar-track"><div class="perf-bar-fill blue" style="width:' + pct + '%"><span class="perf-bar-val">$' + fmtAP(val) + '</span></div></div></div>';
      });

      // Rep comparison (only show if viewing team)
      let repBars = '';
      if (perfRep === 'all') {
        const repTotals = {};
        ytd.forEach(r => { repTotals[r.sales_rep] = (repTotals[r.sales_rep] || 0) + parseFloat(r.annual_premium || 0); });
        const sorted = Object.entries(repTotals).sort((a,b) => b[1] - a[1]);
        const maxRepAP = sorted.length ? sorted[0][1] : 1;
        sorted.forEach(([name, ap], i) => {
          const pct = (ap / maxRepAP * 100).toFixed(1);
          const color = i === 0 ? 'gold' : 'blue';
          repBars += '<div class="perf-bar-row"><div class="perf-bar-label" style="width:90px;">' + name.split(' ')[0] + '</div><div class="perf-bar-track"><div class="perf-bar-fill ' + color + '" style="width:' + pct + '%"><span class="perf-bar-val">$' + fmtAP(ap) + '</span></div></div></div>';
        });
      }

      document.getElementById('perfCharts').innerHTML =
        '<div class="perf-chart-card"><div class="perf-chart-title">Monthly AP Breakdown (YTD)</div><div class="perf-bars">' + monthBars + '</div></div>' +
        (perfRep === 'all' && repBars ? '<div class="perf-chart-card"><div class="perf-chart-title">Rep Comparison (YTD)</div><div class="perf-bars">' + repBars + '</div></div>' : '<div class="perf-chart-card"><div class="perf-chart-title">Weekly Trend</div><div class="perf-bars">' + buildWeeklyBars(data) + '</div></div>');

      // Status breakdown (only for individual rep)
      const statusEl = document.getElementById('perfStatus');
      if (perfRep !== 'all') {
        const uwCount = mtd.filter(r => r.status === 'Underwriting').length;
        const appCount = mtd.filter(r => r.status === 'Approved').length;
        const paidCount = mtd.filter(r => (r.status === 'Issue Paid')).length;
        const total = mtd.length || 1;
        const uwPct = (uwCount / total * 100).toFixed(0);
        const appPct = (appCount / total * 100).toFixed(0);
        const paidPct = (paidCount / total * 100).toFixed(0);

        statusEl.innerHTML = '<div class="perf-status-section"><div class="perf-status-title">Status Breakdown (Month to Date)</div><div class="perf-status-bars">' +
          statusBar('Underwriting', uwPct, 'uw') +
          statusBar('Approved', appPct, 'app') +
          statusBar('Issue Paid', paidPct, 'paid') +
          '</div></div>';
      } else {
        statusEl.innerHTML = '';
      }
    }

    function kpi(label, value, sub) {
      return '<div class="perf-kpi"><div class="perf-kpi-label">' + label + '</div><div class="perf-kpi-value">' + value + '</div><div class="perf-kpi-change neutral">' + sub + '</div></div>';
    }

    function fmtAP(n) { return Math.round(n).toLocaleString('en-US'); }

    function statusBar(label, pct, cls) {
      return '<div class="perf-status-item"><div class="perf-status-item-label"><span>' + label + '</span><span>' + pct + '%</span></div><div class="perf-status-item-bar"><div class="perf-status-item-fill ' + cls + '" style="width:' + pct + '%"></div></div></div>';
    }

    function buildWeeklyBars(data) {
      const now = new Date();
      const weeks = [];
      for (let i = 3; i >= 0; i--) {
        const wEnd = new Date(now); wEnd.setDate(wEnd.getDate() - (i * 7));
        const wStart = new Date(wEnd); wStart.setDate(wStart.getDate() - 7);
        const label = i === 0 ? 'This Week' : i === 1 ? 'Last Week' : i + 'w ago';
        const ap = data.filter(r => { const d = new Date(r.created_at); return d >= wStart && d < wEnd; }).reduce((s,r) => s + parseFloat(r.annual_premium||0), 0);
        weeks.push({ label, ap });
      }
      const max = Math.max(...weeks.map(w => w.ap), 1);
      return weeks.map(w => {
        const pct = (w.ap / max * 100).toFixed(1);
        return '<div class="perf-bar-row"><div class="perf-bar-label">' + w.label + '</div><div class="perf-bar-track"><div class="perf-bar-fill green" style="width:' + pct + '%"><span class="perf-bar-val">$' + fmtAP(w.ap) + '</span></div></div></div>';
      }).join('');
    }
  </script>
</body>
</html>
