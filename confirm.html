<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/KF Transparent.png" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Email Confirmed — Kairos Financial</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body {
      background: linear-gradient(180deg, #0a0e1a 0%, #0d1117 100%);
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .confirm-card {
      text-align: center;
      max-width: 440px;
      width: 92%;
      padding: 3rem 2.5rem;
    }

    .confirm-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(34,197,94,0.12), rgba(34,197,94,0.04));
      border: 2px solid rgba(34,197,94,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.75rem;
      color: #22c55e;
      animation: confirmPop 0.5s ease;
    }

    @keyframes confirmPop {
      0% { opacity: 0; transform: scale(0.7); }
      60% { transform: scale(1.1); }
      100% { opacity: 1; transform: scale(1); }
    }

    .confirm-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.5rem;
      font-weight: 900;
      color: #ffffff;
      margin-bottom: 0.75rem;
    }

    .confirm-sub {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.45);
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }

    .confirm-email {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      color: #3b82f6;
      margin-bottom: 2rem;
      word-break: break-all;
    }

    .confirm-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.8rem 2.2rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      border: none;
      border-radius: 100px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .confirm-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(37,99,235,0.4);
    }

    .confirm-logo {
      margin-top: 2.5rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.15);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="confirm-card">
    <div class="confirm-icon">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1 class="confirm-title">Email Confirmed!</h1>
    <p class="confirm-sub">Your account is verified. You can now log in and start submitting policies.</p>
    <div class="confirm-email" id="userEmail"></div>
    <a href="saleshub.html" class="confirm-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Go to Sales Hub
    </a>
    <div class="confirm-logo">Kairos Financial</div>
  </div>

  <script>
    // Extract email from Supabase confirmation URL hash params if present
    try {
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      // Supabase may also use query params
      const query = new URLSearchParams(window.location.search);

      // Try to get email from various possible params
      const email = params.get('email') || query.get('email') || '';
      const el = document.getElementById('userEmail');

      if (email) {
        el.textContent = email;
      } else {
        el.style.display = 'none';
      }
    } catch (e) {
      document.getElementById('userEmail').style.display = 'none';
    }
  </script>
</body>
</html>
